<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <!-- CRITICAL: Prevents phone browsers from scaling down the page -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Responsive Flipbook</title>
  
  <!-- StPageFlip CDN -->
  <script src="https://cdn.jsdelivr.net/npm/page-flip@2.0.7/dist/js/page-flip.browser.min.js"></script>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: #121212;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      overflow: hidden;
      font-family: system-ui, -apple-system, sans-serif;
    }

    /* Container wraps the flipbook and forces edge-to-edge layout on phones */
    .flipbook-wrapper {
      width: 100vw;
      max-width: 900px;
      height: 85vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 10px;
    }

    #book {
      width: 100%;
      height: 100%;
      margin: 0 auto;
    }

    /* Styling individual pages */
    .page {
      background-color: #ffffff;
      padding: 24px;
      border: 1px solid #ddd;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .page-content {
      color: #333;
    }

    .page-footer {
      text-align: center;
      font-size: 12px;
      color: #888;
    }

    /* Adjust page padding for narrow mobile screens */
    @media (max-width: 600px) {
      .flipbook-wrapper {
        padding: 4px;
        height: 92vh;
      }
      .page {
        padding: 16px;
      }
    }
  </style>
</head>
<body>

  <div class="flipbook-wrapper">
    <div id="book">
      <!-- Page 1 (Cover) -->
      <div class="page" data-density="hard">
        <div class="page-content">
          <h2>Cover Page</h2>
          <p>Welcome to the flipbook.</p>
        </div>
        <div class="page-footer">1</div>
      </div>

      <!-- Page 2 -->
      <div class="page">
        <div class="page-content">
          <h3>Page 2</h3>
          <p>This page scales dynamically to fill the phone screen.</p>
        </div>
        <div class="page-footer">2</div>
      </div>

      <!-- Page 3 -->
      <div class="page">
        <div class="page-content">
          <h3>Page 3</h3>
          <p>No more fat borders or tiny cards in portrait mode.</p>
        </div>
        <div class="page-footer">3</div>
      </div>

      <!-- Page 4 -->
      <div class="page" data-density="hard">
        <div class="page-content">
          <h3>Back Cover</h3>
          <p>The End.</p>
        </div>
        <div class="page-footer">4</div>
      </div>
    </div>
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", function () {
      const pageFlip = new St.PageFlip(document.getElementById("book"), {
        // Base width and height ratio per single page
        width: 400,
        height: 600,

        // KEY SETTINGS FOR MOBILE FLEXIBILITY:
        size: "stretch",           // Stretches to fill parent container
        minWidth: 280,             // Lower threshold for narrow phones
        maxWidth: 1000,            // Upper threshold for large screens
        minHeight: 400,
        maxHeight: 1400,

        usePortrait: true,         // Allows single-page portrait layout on mobile
        startZIndex: 0,
        autoSize: true,            // Adapts wrapper element boundaries
        maxShadowOpacity: 0.5,
        showCover: false,           // Treats 1st and last page as covers in single-page mode
        mobileScrollSupport: true  // Prevents native touch conflicts on mobile
      });

      // Load all .page HTML blocks into the flipbook
      pageFlip.loadFromHTML(document.querySelectorAll(".page"));
    });
  </script>
</body>
</html>
