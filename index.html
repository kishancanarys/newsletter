<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Full Screen Magazine</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body, html {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: #1a1a1a;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* Container for the flipbook wrapper */
    #flipbook-wrapper {
      width: 100vw;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* Individual page styles */
    .page {
      background-color: #ffffff;
      padding: 2rem;
      overflow: hidden;
      font-family: system-ui, -apple-system, sans-serif;
      box-shadow: 0 0 20px rgba(0, 0, 0, 0.2);
    }

    .page-content {
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }
  </style>
</head>
<body>

  <div id="flipbook-wrapper">
    <div id="magazine">
      <!-- Page 1 (Soft Cover) -->
      <div class="page">
        <div class="page-content">
          <h1>TECH MONTHLY</h1>
          <p>Issue #42 — Soft Cover Edition</p>
        </div>
      </div>

      <!-- Page 2 -->
      <div class="page">
        <div class="page-content">
          <h2>Editor's Note</h2>
          <p>This layout dynamically scales to fill the screen on any device.</p>
        </div>
      </div>

      <!-- Page 3 -->
      <div class="page">
        <div class="page-content">
          <h2>Feature Article</h2>
          <p>On mobile displays, it automatically renders as a single page view.</p>
        </div>
      </div>

      <!-- Page 4 -->
      <div class="page">
        <div class="page-content">
          <h2>Back Cover</h2>
          <p>End of preview.</p>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/page-flip@2.0.7/dist/js/page-flip.browser.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const wrapper = document.getElementById('flipbook-wrapper');

      // 1. Calculate responsive dimensions based on viewport
      const screenWidth = window.innerWidth;
      const screenHeight = window.innerHeight;

      // On mobile (portrait or narrow screens), fit 1 page. On desktop, fit 2 pages side-by-side.
      const isMobile = screenWidth < 768;
      
      let pageWidth, pageHeight;

      if (isMobile) {
        // Single page width occupies ~90% of screen width
        pageWidth = Math.floor(screenWidth * 0.9);
        pageHeight = Math.floor(screenHeight * 0.85);
      } else {
        // Two pages side-by-side: each page width is ~45% of total screen width
        pageWidth = Math.floor((screenWidth * 0.9) / 2);
        pageHeight = Math.floor(screenHeight * 0.88);
      }

      // 2. Initialize StPageFlip with custom options
      const pageFlip = new St.PageFlip(document.getElementById('magazine'), {
        width: pageWidth,
        height: pageHeight,
        size: "stretch",          // Allows full-screen scaling
        minWidth: 280,
        maxWidth: 1000,
        minHeight: 400,
        maxHeight: 1400,
        showCover: false,         // Disables hard-cover first-page offset
        usePortrait: true,        // Switches to 1 page mode on mobile / portrait orientation
        startPage: 0,
        drawShadow: true,
        flippingTime: 800,
        useMouseEvents: true,
        swipeDistance: 30         // Mobile touch responsiveness
      });

      // 3. Load DOM pages
      pageFlip.loadFromHTML(document.querySelectorAll('.page'));

      // Optional: Handle viewport resize dynamically
      window.addEventListener('resize', () => {
        pageFlip.updateFromHtml(document.querySelectorAll('.page'));
      });
    });
  </script>
</body>
</html>
